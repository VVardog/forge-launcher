name: Build Windows Installer

# Builds the one-click NSIS installer on a real Windows runner (no Wine, ever)
# and publishes it to a GitHub Release. Triggers on version tags (v*) or manually.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Windows NSIS installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        shell: bash
        run: ls -la dist/

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-launcher-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          generate_release_notes: true
